<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리디튜드 학습 플래너 - 로그인</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
    <style>
        * { font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, -apple-system, "Segoe UI", sans-serif; }
        body { background: radial-gradient(1200px 600px at 50% -220px, #d7ede8, transparent 70%), #eef3f3; color: #17242e; margin: 0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; letter-spacing: -.01em; }
        .login-container { max-width: 400px; width: 100%; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 1px 2px rgba(20,40,55,.05), 0 20px 50px rgba(20,40,55,.12); border: 1px solid #e0e8ea; }
        h1 { text-align: center; color: #0a6c62; margin-bottom: 30px; font-size: 28px; font-weight: 800; letter-spacing: -.02em; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #485a68; }
        .input-group input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #cdd9db; box-sizing: border-box; font-size: 16px; transition: all 0.3s ease; background: #f4f7f7; }
        .input-group input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12); background: #fff; }
        .login-button { width: 100%; padding: 14px; border: none; background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%); color: white; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: 700; margin-top: 10px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(13, 148, 136, 0.28); }
        .login-button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(13, 148, 136, 0.38); }
        .error-message { color: #b3261e; text-align: center; margin-top: 15px; padding: 10px; background-color: #fbe9e7; border-radius: 8px; display: none; }
        .logo { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-header" style="text-align: center; margin-bottom: 4px;">
            <img src="/assets/readiplan-logo.svg" alt="리디플랜" style="width: 100%; max-width: 300px; height: auto; display: block; margin: 0 auto;">
        </div>
        <div class="logo" style="margin-bottom: 26px;">
            <img src="/assets/logo.png" alt="리디튜드" style="width: 124px; height: auto; display: block; margin: 0 auto;">
        </div>
        <form id="loginForm">
            <div class="input-group">
                <label for="studentId">학생 ID</label>
                <input type="text" id="studentId" name="studentId" required>
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-button">로그인</button>
        </form>
        <div id="errorMessage" class="error-message"></div>
        <div style="text-align: center; margin-top: 30px; color: #6c757d; font-size: 14px;">
            <a href="/teacher-login" style="color: #0a6c62; text-decoration: none; font-weight: 600;">선생님 로그인</a>
        </div>
    </div>

    <script>
        console.log("로그인 페이지 스크립트가 로드되었습니다.");

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            console.log("로그인 폼 제출 이벤트가 감지되었습니다!");
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginButton = e.target.querySelector('.login-button');

            errorDiv.style.display = 'none';
            loginButton.textContent = '로그인 중...';
            loginButton.disabled = true;
            
            try {
                console.log("서버로 로그인 요청을 보내기 직전입니다...");
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId, studentPassword: password })
                });
                
                console.log("서버로부터 응답을 받았습니다. 상태 코드:", response.status);
                const result = await response.json();
                
                if (result.success) {
                    console.log("로그인 성공! 플래너 페이지로 이동합니다.");
                    localStorage.setItem('authToken', result.token);
                    window.location.href = '/planner';
                } else {
                    console.log("로그인 실패. 서버가 보낸 메시지:", result.message);
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error("Fetch 요청 중 심각한 에러 발생:", error);
                errorDiv.textContent = '로그인 중 오류가 발생했습니다. 서버가 켜져있는지, Console 창에 다른 에러가 없는지 확인하세요.';
                errorDiv.style.display = 'block';
            } finally {
                console.log("로그인 절차(try 또는 catch)가 모두 끝났습니다.");
                loginButton.textContent = '로그인';
                loginButton.disabled = false;
            }
        });
    </script>
</body>
</html>

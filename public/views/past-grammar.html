<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지난주 문법 숙제 현황 - 리디튜드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
    <style>
        body { font-family: "NanumSquareRound", sans-serif; background-color: #f3f4f6; padding: 30px; }
        .styled-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .styled-table th { background: #8b5cf6; color: white; padding: 12px; font-weight: 700; text-align: center; }
        .styled-table td { padding: 12px; border-bottom: 1px solid #e5e7eb; text-align: center; vertical-align: middle; }
        .styled-table tr:hover { background-color: #f8fafc; }
        .class-title { font-size: 1.5rem; font-weight: 800; color: #4c1d95; margin-bottom: 10px; margin-top: 30px; display: flex; align-items: center; }
        .tag-badge { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 6px; font-size: 13px; font-weight: bold; display: inline-block; margin: 2px; }
        .score-badge { font-weight: 800; padding: 4px 10px; border-radius: 6px; }
        .score-high { color: #047857; background: #d1fae5; }
        .score-mid { color: #b45309; background: #fef3c7; }
        .score-low { color: #b91c1c; background: #fee2e2; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center border-b-2 border-purple-300 pb-4 mb-6">
            <h1 class="text-3xl font-extrabold text-purple-800">📊 지난 1주일 문법숙제 통합 현황</h1>
            <button onclick="window.close()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold transition">창 닫기</button>
        </div>

        <div id="loading" class="text-center py-20 text-gray-500 font-bold text-xl">데이터를 불러오는 중입니다...</div>
        <div id="contentArea"></div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const authToken = localStorage.getItem('teacher_auth_token');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!authToken) {
                document.getElementById('loading').innerHTML = '로그인이 필요합니다.<br><button onclick="window.close()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded">닫기</button>';
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/past-grammar-data`, {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';

                if (data.success && data.data.length > 0) {
                    renderTables(data.data);
                } else {
                    document.getElementById('contentArea').innerHTML = '<div class="text-center py-20 text-gray-500 font-bold text-xl">최근 1주일간 등록된 문법 기록이 없습니다.</div>';
                }
            } catch (error) {
                document.getElementById('loading').innerHTML = '<span class="text-red-500">데이터를 불러오는데 실패했습니다.</span>';
            }
        });

        function renderTables(records) {
            // 반(className)별로 데이터 그룹화
            const grouped = {};
            records.forEach(r => {
                if (!grouped[r.className]) grouped[r.className] = [];
                grouped[r.className].push(r);
            });

            const contentArea = document.getElementById('contentArea');
            let html = '';

            // 각 반별로 테이블 생성
            Object.keys(grouped).sort().forEach(className => {
                const classRecords = grouped[className];
                
                html += `
                    <div class="class-title">
                        <span class="mr-2">🏫</span> [${className}] 문법 클래스
                    </div>
                    <table class="styled-table mb-8">
                        <colgroup>
                            <col style="width:12%">
                            <col style="width:13%">
                            <col style="width:20%">
                            <col style="width:25%">
                            <col style="width:20%">
                            <col style="width:10%">
                        </colgroup>
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th>학생 이름</th>
                                <th>오늘 문법 진도</th>
                                <th>문법 과제 내용</th>
                                <th>문법 테스트 내용</th>
                                <th>점수</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                classRecords.forEach(r => {
                    // 태그 배지 렌더링
                    const tags = r.test.split(',').map(t => t.trim()).filter(Boolean);
                    const tagHtml = tags.length > 0 && tags[0] !== '-' ? tags.map(t => `<span class="tag-badge">${t}</span>`).join('') : '-';

                    // 점수 색상
                    let scoreHtml = '-';
                    if (r.score !== 'N/A') {
                        const s = Number(r.score);
                        let sClass = 'score-low';
                        if (s >= 80) sClass = 'score-high';
                        else if (s >= 60) sClass = 'score-mid';
                        scoreHtml = `<span class="score-badge ${sClass}">${s}점</span>`;
                    }

                    html += `
                        <tr>
                            <td class="text-gray-500 font-bold">${r.date}</td>
                            <td class="font-bold text-gray-800">${r.studentName}</td>
                            <td class="text-left px-4">${r.topic}</td>
                            <td class="text-left px-4">${r.homework}</td>
                            <td>${tagHtml}</td>
                            <td>${scoreHtml}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
            });

            contentArea.innerHTML = html;
        }
    </script>
</body>
</html>

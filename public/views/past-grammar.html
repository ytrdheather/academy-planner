<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지난주 문법 숙제 현황 - 리디튜드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
    <style>
        /* 대시보드 폰트와 유사하게 사이즈 축소 및 색상 조정 */
        body { font-family: "NanumSquareRound", sans-serif; background-color: #f8f9fa; padding: 25px; color: #2d3748; }
        
        .styled-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-size: 14px; }
        .styled-table th { background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%); color: white; padding: 10px 12px; font-weight: 600; text-align: center; border-bottom: 1px solid #7c3aed; }
        .styled-table td { padding: 10px 12px; border-bottom: 1px solid #f1f3f4; text-align: center; vertical-align: middle; }
        .styled-table tr:hover { background-color: #f8fafc; }
        
        .class-header { margin-top: 25px; margin-bottom: 10px; border-bottom: 2px solid #d8b4fe; padding-bottom: 6px; }
        .class-title { font-size: 16px; font-weight: 700; color: #6b46c1; display: flex; align-items: center; }
        
        .tag-badge { background: #f3e8ff; color: #6b46c1; border: 1px solid #d8b4fe; padding: 3px 8px; border-radius: 12px; font-size: 13px; font-weight: 600; display: inline-block; margin: 2px; }
        
        .score-badge { font-weight: 700; padding: 4px 10px; border-radius: 6px; font-size: 13px; }
        .score-high { color: #166534; background: #dcfce7; border: 1px solid #bbf7d0; }
        .score-mid { color: #9a3412; background: #fef3c7; border: 1px solid #fde68a; }
        .score-low { color: #991b1b; background: #fecaca; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center border-b border-gray-300 pb-3 mb-4">
            <h1 class="text-xl font-bold text-gray-800">📊 지난 1주일 문법숙제 통합 현황</h1>
            <div class="flex gap-2">
                <button onclick="loadData(true)" class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded-md font-bold text-sm transition">🔄 새로고침</button>
                <button onclick="window.close()" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-1.5 rounded-md font-bold text-sm transition">창 닫기</button>
            </div>
        </div>

        <div id="loading" class="text-center py-10 text-gray-500 font-bold text-sm">데이터를 불러오는 중입니다...</div>
        <div id="contentArea"></div>
        <datalist id="grammarTagList"></datalist>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const authToken = localStorage.getItem('teacher_auth_token');

        document.addEventListener('DOMContentLoaded', () => {
            if (!authToken) {
                document.getElementById('loading').innerHTML = '로그인이 필요합니다.<br><button onclick="window.close()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded text-sm">닫기</button>';
                return;
            }
            loadTagOptions();
            loadData();
        });

        // 문법 테스트 내용 자동완성용 태그 목록
        async function loadTagOptions() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/notion-grammar-options`, { headers: { 'Authorization': 'Bearer ' + authToken } });
                const j = await res.json();
                const opts = j.options || j.data || [];
                document.getElementById('grammarTagList').innerHTML = opts.map(o => `<option value="${o}">`).join('');
            } catch (e) { /* 자동완성 없어도 입력은 가능 */ }
        }

        async function loadData(force = false) {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            loading.textContent = '데이터를 불러오는 중입니다...';
            try {
                const res = await fetch(`${API_BASE_URL}/api/past-grammar-data${force ? '?force=true' : ''}`, {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const data = await res.json();
                loading.style.display = 'none';
                if (data.success && data.data.length > 0) {
                    renderTables(data.data);
                } else {
                    document.getElementById('contentArea').innerHTML = '<div class="text-center py-10 text-gray-500 font-bold text-sm">최근 1주일간 등록된 문법 기록이 없습니다.</div>';
                }
            } catch (error) {
                loading.innerHTML = '<span class="text-red-500 text-sm">데이터를 불러오는데 실패했습니다.</span>';
            }
        }

        // 문법 테스트 내용(태그) 저장
        async function saveTest(el) {
            const pid = el.dataset.pid;
            try {
                el.style.borderColor = '#a855f7';
                await fetch(`${API_BASE_URL}/api/update-homework`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
                    body: JSON.stringify({ pageId: pid, propertyName: '문법 테스트 내용', newValue: el.value, propertyType: 'multi_select' })
                });
                el.style.borderColor = '#16a34a';
                el.title = '저장됨';
            } catch (e) {
                el.style.borderColor = '#dc2626';
                el.title = '저장 실패';
            }
        }

        // 문법 문항/오답 개수 저장 + 점수 미리보기 갱신
        async function saveGrammarNum(el) {
            if (el.value === '') return; // 빈칸은 저장 안 함
            const pid = el.dataset.pid, prop = el.dataset.prop;
            try {
                el.style.borderColor = '#a855f7';
                await fetch(`${API_BASE_URL}/api/update-homework`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
                    body: JSON.stringify({ pageId: pid, propertyName: prop, newValue: Number(el.value), propertyType: 'number' })
                });
                el.style.borderColor = '#16a34a';
                // 점수 미리보기 (정답/전체*100). 정확한 값은 새로고침 시 노션 수식으로 확정
                const row = el.closest('tr');
                const total = parseFloat(row.querySelector('.js-gtotal')?.value);
                const wrong = parseFloat(row.querySelector('.js-gwrong')?.value);
                const cell = row.querySelector('.js-score');
                if (cell && !isNaN(total) && total > 0 && !isNaN(wrong)) {
                    const s = Math.round((total - wrong) / total * 100);
                    const cls = s >= 80 ? 'score-high' : (s >= 60 ? 'score-mid' : 'score-low');
                    cell.innerHTML = `<span class="score-badge ${cls}">${s}점</span>`;
                }
            } catch (e) { el.style.borderColor = '#dc2626'; }
        }

        function renderTables(records) {
            const grouped = {};
            records.forEach(r => {
                if (!grouped[r.className]) grouped[r.className] = [];
                grouped[r.className].push(r);
            });

            const contentArea = document.getElementById('contentArea');
            let html = '';

            Object.keys(grouped).sort().forEach(className => {
                const classRecords = grouped[className];

                // 날짜+숙제 내용이 같은 것은 하나로 합쳐서 부여일 목록 생성
                const hwMap = new Map();
                classRecords.forEach(r => {
                    if (r.homework && r.homework !== '-') {
                        const key = r.date + '||' + r.homework;
                        if (!hwMap.has(key)) hwMap.set(key, { date: r.date, homework: r.homework });
                    }
                });
                // 날짜 오름차순 정렬
                const hwList = Array.from(hwMap.values()).sort((a, b) => a.date.localeCompare(b.date));

                let hwHtml = '';
                if (hwList.length === 0) {
                    hwHtml = '<span style="color:#a0aec0">숙제 내용 없음</span>';
                } else {
                    hwList.forEach((hw, idx) => {
                        const dateLabel = hw.date || '날짜 미상';
                        hwHtml += `<div style="margin-bottom:4px"><span style="color:#6b46c1;font-weight:700">${idx + 1}.</span> <span style="color:#6b46c1;font-weight:700">문법 숙제 부여일 : ${dateLabel}</span>&nbsp;&nbsp;문법 숙제 내용 : <span style="color:#2d3748;font-weight:600">${hw.homework}</span></div>`;
                    });
                }

                html += `
                    <div class="class-header">
                        <div class="class-title">
                            <span class="mr-2">🏫</span> [${className}]
                        </div>
                        <div style="margin-top:6px; font-size:14px; color:#4a5568; line-height:1.8;">${hwHtml}</div>
                    </div>
                    <table class="styled-table mb-6">
                        <colgroup>
                            <col style="width:11%">
                            <col style="width:11%">
                            <col style="width:38%">
                            <col style="width:9%">
                            <col style="width:9%">
                            <col style="width:22%">
                        </colgroup>
                        <thead>
                            <tr>
                                <th>이름</th>
                                <th>시험일</th>
                                <th>지난주 문법 테스트 내용 (입력 가능)</th>
                                <th>문항</th>
                                <th>오답</th>
                                <th>점수</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                classRecords.forEach(r => {
                    const testVal = (r.test && r.test !== '-') ? r.test.replace(/"/g, '&quot;') : '';
                    const testInput = `<input list="grammarTagList" value="${testVal}" data-pid="${r.pageId}" onchange="saveTest(this)" placeholder="태그 입력 (여러 개는 쉼표로)" style="width:100%; border:1px solid #d8b4fe; border-radius:6px; padding:5px 8px; font-size:13px;">`;
                    const dateHtml = r.date ? `<span style="color:#6b46c1; font-weight:600; font-size:13px;">${r.date}</span>` : '<span class="text-gray-400">-</span>';
                    const numStyle = 'width:52px; border:1px solid #cbd5e0; border-radius:6px; padding:5px 4px; font-size:13px; text-align:center;';
                    const totalInput = `<input type="number" min="0" class="js-gtotal" value="${r.grammarTotal ?? ''}" data-pid="${r.pageId}" data-prop="문법(전체 개수)" onchange="saveGrammarNum(this)" style="${numStyle}">`;
                    const wrongInput = `<input type="number" min="0" class="js-gwrong" value="${r.grammarWrong ?? ''}" data-pid="${r.pageId}" data-prop="문법(틀린 개수)" onchange="saveGrammarNum(this)" style="${numStyle}">`;

                    let scoreHtml = '<span class="text-gray-400">-</span>';
                    
                    // [이중 방어] 서버가 0을 보내든, 문자를 보내든 무조건 잡아냅니다!
                    if (r.score === '시험 보지 않음' || Number(r.score) === 0) {
                        scoreHtml = '<span class="text-gray-500 font-bold text-xs bg-gray-100 px-2 py-1 rounded border border-gray-200">시험 보지 않음</span>';
                    } else if (r.score !== 'N/A') {
                        const s = Math.floor(Number(r.score)); 
                        let sClass = 'score-low';
                        if (s >= 80) sClass = 'score-high';
                        else if (s >= 60) sClass = 'score-mid';
                        scoreHtml = `<span class="score-badge ${sClass}">${s}점</span>`;
                    }

                    html += `
                        <tr>
                            <td class="font-bold text-gray-800">${r.studentName}</td>
                            <td>${dateHtml}</td>
                            <td>${testInput}</td>
                            <td>${totalInput}</td>
                            <td>${wrongInput}</td>
                            <td class="js-score">${scoreHtml}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
            });

            contentArea.innerHTML = html;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지난주 문법 숙제 현황 - 리디튜드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square-round.css" rel="stylesheet">
    <style>
        /* 대시보드 폰트와 유사하게 사이즈 축소 및 색상 조정 */
        body { font-family: "NanumSquareRound", sans-serif; background-color: #f8f9fa; padding: 25px; color: #2d3748; }
        
        .styled-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-size: 14px; }
        .styled-table th { background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%); color: white; padding: 10px 12px; font-weight: 600; text-align: center; border-bottom: 1px solid #7c3aed; }
        .styled-table td { padding: 10px 12px; border-bottom: 1px solid #f1f3f4; text-align: center; vertical-align: middle; }
        .styled-table tr:hover { background-color: #f8fafc; }
        
        .class-header { margin-top: 25px; margin-bottom: 10px; border-bottom: 2px solid #d8b4fe; padding-bottom: 6px; }
        .class-title { font-size: 16px; font-weight: 700; color: #6b46c1; display: flex; align-items: center; }
        
        .tag-badge { background: #f3e8ff; color: #6b46c1; border: 1px solid #d8b4fe; padding: 3px 8px; border-radius: 12px; font-size: 13px; font-weight: 600; display: inline-block; margin: 2px; }
        
        .score-badge { font-weight: 700; padding: 4px 10px; border-radius: 6px; font-size: 13px; }
        .score-high { color: #166534; background: #dcfce7; border: 1px solid #bbf7d0; }
        .score-mid { color: #9a3412; background: #fef3c7; border: 1px solid #fde68a; }
        .score-low { color: #991b1b; background: #fecaca; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center border-b border-gray-300 pb-3 mb-4">
            <h1 class="text-xl font-bold text-gray-800">📊 지난 1주일 문법숙제 통합 현황</h1>
            <button onclick="window.close()" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-1.5 rounded-md font-bold text-sm transition">창 닫기</button>
        </div>

        <div id="loading" class="text-center py-10 text-gray-500 font-bold text-sm">데이터를 불러오는 중입니다...</div>
        <div id="contentArea"></div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const authToken = localStorage.getItem('teacher_auth_token');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!authToken) {
                document.getElementById('loading').innerHTML = '로그인이 필요합니다.<br><button onclick="window.close()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded text-sm">닫기</button>';
                return;
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/past-grammar-data`, {
                    headers: { 'Authorization': 'Bearer ' + authToken }
                });
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';

                if (data.success && data.data.length > 0) {
                    renderTables(data.data);
                } else {
                    document.getElementById('contentArea').innerHTML = '<div class="text-center py-10 text-gray-500 font-bold text-sm">최근 1주일간 등록된 문법 기록이 없습니다.</div>';
                }
            } catch (error) {
                document.getElementById('loading').innerHTML = '<span class="text-red-500 text-sm">데이터를 불러오는데 실패했습니다.</span>';
            }
        });

        function renderTables(records) {
            // 반(className)별로 데이터 그룹화
            const grouped = {};
            records.forEach(r => {
                if (!grouped[r.className]) grouped[r.className] = [];
                grouped[r.className].push(r);
            });

            const contentArea = document.getElementById('contentArea');
            let html = '';

            Object.keys(grouped).sort().forEach(className => {
                const classRecords = grouped[className];
                
                // 해당 반의 가장 최근(유효한) 숙제 내용 찾기
                const validHomeworks = classRecords.map(r => r.homework).filter(h => h && h !== '-');
                const recentHomework = validHomeworks.length > 0 ? validHomeworks[0] : '숙제 내용 없음';

                // 요구하신 헤더 포맷: [문법 반 이름 ] 지난 주 문법숙제 : 숙제내용
                html += `
                    <div class="class-header">
                        <div class="class-title">
                            <span class="mr-2">🏫</span> [${className}] 지난 주 문법숙제 : <span style="color:#4a5568; font-size:15px; font-weight:600; margin-left:8px;">${recentHomework}</span>
                        </div>
                    </div>
                    <table class="styled-table mb-6">
                        <colgroup>
                            <col style="width:20%">
                            <col style="width:60%">
                            <col style="width:20%">
                        </colgroup>
                        <thead>
                            <tr>
                                <th>이름</th>
                                <th>지난주 문법 테스트 내용</th>
                                <th>점수</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                classRecords.forEach(r => {
                    // 태그 렌더링
                    const tags = r.test.split(',').map(t => t.trim()).filter(Boolean);
                    const tagHtml = tags.length > 0 && tags[0] !== '-' 
                        ? tags.map(t => `<span class="tag-badge">${t}</span>`).join('') 
                        : '<span class="text-gray-400">-</span>';

                    // 점수 렌더링 (일의 자리까지만 절사)
                    let scoreHtml = '<span class="text-gray-400">-</span>';
                    
                    if (r.score === '시험 보지 않음') {
                        // [신규] 시험 보지 않음일 경우 회색의 깔끔한 뱃지 표시
                        scoreHtml = '<span class="text-gray-500 font-bold text-xs bg-gray-100 px-2 py-1 rounded border border-gray-200">시험 보지 않음</span>';
                    } else if (r.score !== 'N/A') {
                        // 소수점 아래는 무조건 내림(절사) 처리합니다.
                        const s = Math.floor(Number(r.score)); 
                        let sClass = 'score-low';
                        if (s >= 80) sClass = 'score-high';
                        else if (s >= 60) sClass = 'score-mid';
                        scoreHtml = `<span class="score-badge ${sClass}">${s}점</span>`;
                    }

                    html += `
                        <tr>
                            <td class="font-bold text-gray-800">${r.studentName}</td>
                            <td>${tagHtml}</td>
                            <td>${scoreHtml}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
            });

            contentArea.innerHTML = html;
        }
    </script>
</body>
</html>
